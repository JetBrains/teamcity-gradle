apply plugin: 'java'

tasks.register('printSystemProperty') {
  println "##system-property from project.ext: ${project.findProperty("my_custom_property") ?: "not found"}"
  println "##system-property from project.ext.teamcity: ${project.teamcity?.get("my_custom_property") ?: "not found"}"
}

tasks.register('printSystemPropertyFromProjectExt') {
  println "##system-property from project.ext: ${project.findProperty("my_custom_property") ?: "not found"}"
}

tasks.register('printSystemPropertyFromProjectExtTeamcity') {
  println "##system-property from project.ext.teamcity: ${project.teamcity?.get("my_custom_property") ?: "not found"}"
}


