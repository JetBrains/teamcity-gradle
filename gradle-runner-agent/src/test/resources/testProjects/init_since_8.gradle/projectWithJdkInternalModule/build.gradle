tasks.register('internalThings') {
    doLast {
        def moduleBootstrap = Class.forName("jdk.internal.module.ModuleBootstrap")
        def warnMethod = moduleBootstrap.getDeclaredMethod("warn", String.class)
        warnMethod.setAccessible(true)
        warnMethod.invoke(null, "TeamCity internal module access probe")
        println("internal module access succeeded")
    }
}
