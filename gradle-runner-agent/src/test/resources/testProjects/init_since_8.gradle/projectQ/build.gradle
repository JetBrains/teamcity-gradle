plugins {
    id 'java'
}

group 'one.trifle'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation files(
            '../../lib/testng-6.9.10.jar',
            '../../lib/jcommander-1.48.jar',
    )
}

test {
    useTestNG() {
        suites 'src/test/resources/testng.xml'
    }
}
