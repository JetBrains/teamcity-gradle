abstract class TeamcityBuildProblemReportingPlugin implements Plugin<Gradle> {
  @Inject
  abstract FlowScope getFlowScope()

  @Inject
  abstract FlowProviders getFlowProviders()

  void apply(Gradle gradle) {
    flowScope.always(TeamcityBuildProblemAction) { spec ->
      spec.parameters.buildResult.set(flowProviders.buildWorkResult)
    }
  }
}

/**
 * Reports the build failure as a build problem, if eligible.
 */
abstract class TeamcityBuildProblemAction implements FlowAction<Parameters> {
  interface Parameters extends FlowParameters {
    @Input
    Property<BuildWorkResult> getBuildResult()
  }

  @Override
  void execute(Parameters parameters) {
    BuildWorkResult buildWorkResult = parameters.buildResult.get()
    if (!buildWorkResult.failure.present) return

    Throwable failure = getRootCauseOfFailure(buildWorkResult)
    String message = getMessageForFailure(failure)

    if (message.contains("There were failing tests") || message.contains("Compilation failed") || message.contains("Compilation error")) {
      // do not report tests and compilation failures as build problems, as they are logged separately
      return
    }
    ServiceMessage serviceMessage = new ServiceMessage(
            name: "buildProblem",
            attributes: [type       : "gradleBuildProblem",
                         identity   : ("gradleBuildProblem ${message}" as String).hashCode(),
                         description: message
            ])
    println(serviceMessage.asString())
  }

  private static Throwable getRootCauseOfFailure(BuildWorkResult buildWorkResult) {
    Throwable failure = buildWorkResult.failure.get()
    while (!(failure instanceof TaskExecutionException) && failure != failure.getCause() && failure.getCause() != null) {
      failure = failure.getCause()
    }

    return failure
  }

  private static String getMessageForFailure(Throwable failure) {
    if (failure instanceof TaskExecutionException && failure.getCause() != null) {
      return "${failure.getMessage()} ${failure.getCause().getClass().getName()}: ${failure.getCause().getMessage()}"
    }
    return "${failure.getClass().getName()}: ${failure.getMessage()}"
  }
}

