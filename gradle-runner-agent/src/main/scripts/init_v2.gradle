public class DependencyBasedTestRun {

  Logger logger

  public DependencyBasedTestRun(Logger logger) {
    this.logger = logger
  }

  public def configureGradle(Gradle gradle) {
    def rootProject = gradle.rootProject
    def incrementalOption = System.getenv(Constants.GRADLE_INCREMENTAL_MODE_ENV_VAR)
    logger.debug("Received following incremental setting: ${incrementalOption}")

    switch(incrementalOption) {
      case "skip_incremental":
        logger.debug("Incremental building is enabled, but full rebuild is forced");
        gradle.startParameter.taskNames = ["build"];
        break;

      case "do_incremental":
        if (BuildFeatures.areIsolatedProjectsEnabled(gradle)) {
          logger.lifecycle("Incremental mode is not compatible with Gradle Isolated Projects. Falling back to a full build.")
          gradle.startParameter.taskNames = ["build"]
          break
        }
        logger.debug("Will look for affected projects")
        def modifiedProjects = findAffectedProjects(rootProject);
        if (modifiedProjects.empty) {
          logger.debug("No affected projects found. Running full build.")
          gradle.startParameter.taskNames = ["build"]
        } else {
          gradle.startParameter.taskNames = modifiedProjects.collect { it + ":buildDependents" }
          logger.debug("Will start with following tasks: ${gradle.startParameter.taskNames}")
        }
        break;

      default:
        logger.debug("Incremental building is not enabled");
    }
  }


  private def findAffectedProjects(Project project) {
    String changedFilesFile = System.getProperty(Constants.BUILD_CHANGED_FILES_FILE_SYSTEM_PROP)

    if (changedFilesFile != null && !changedFilesFile.isEmpty()) {
      def changedFiles = readChangedFiles(changedFilesFile)
      def sourceSetsToProject = readSourceSets(project);

      logger.debug("Modified Files: ${changedFiles}")
      logger.debug("SourceSets to Project: ${sourceSetsToProject}")

      def changedProjects = []
      changedFiles.each { path ->
        sourceSetsToProject.findAll({
          path.startsWith(it.key)
        }).collect(changedProjects) {it.value}
      }

      logger.debug("Changes detected in following projects:")
      logger.debug("${changedProjects}")

      return changedProjects
    }
  }

  private def readSourceSets(Project proj) {
    def result = [:]
    proj.allprojects {
      def collectRelativePath = { File file ->
        def path = proj.relativePath(file.getAbsolutePath()).replace('\\','/')
        result[path] = project.getPath()
      }
      if (delegate.hasProperty("sourceSets")) {
        sourceSets*.allSource.srcDirs*.each collectRelativePath
        sourceSets*.resources.srcDirs*.each collectRelativePath
      }
    }
    return result
  }

  private def readChangedFiles(String changedFilesFile) {
    def lines = new File(changedFilesFile).readLines()
    def personalMatch = /(.*):(.*):<personal>/
    def allMatch = /(.*):(.*):(.*)/

    if (lines.any { it ==~ personalMatch }) {
      return lines.grep(~personalMatch).collect {
        (it =~ personalMatch)[0][1]
      }
    } else {
      return lines.collect {
        (it =~ allMatch)[0][1]
      }
    }
  }
}

// region Extension of the project's extra properties with TeamCity build properties

// This class extends the Gradle project properties (project.ext) with TeamCity build properties.
// This is quite complicated for setups that use the configuration cache, as it can lead unnecessary configuration cache invalidations.
// Possibly, a better approach would be to avoid extending project.ext altogether.
// The property extension can be kept for older Gradle versions and removed for newer versions.
class ProjectExtraPropertiesExtender implements ProjectEvaluationListener {

  private final Logger logger

  ProjectExtraPropertiesExtender(Logger logger) {
    this.logger = logger
  }

  @Override
  void beforeEvaluate(Project project) {
    addTeamCityPropertiesToExtraProperties(project)
  }

  @Override
  void afterEvaluate(Project project, ProjectState projectState) {}

  static void logBuildPropertiesUsageWarningMessageIfNeeded(Gradle gradle, Logger logger) {
    if (doNotPopulateGradleProperties() || !BuildFeatures.isConfigurationCacheRequested(gradle)) return

    def warningMessage =
            "\nGradle Configuration Cache is used in this build.\n" +
            "Avoid accessing TeamCity build properties from the Gradle project " +
            "('project.teamcity.buildprop', 'project.buildprop', 'teamcity.buildprop', '\$buildprop', etc.), " +
            "as they can cause issues in Configuration Cache setups and will be removed for newer Gradle versions.\n" +
            "If you experience unwarranted Configuration Cache invalidations, " +
            "disable the population of the project properties with TeamCity build properties by setting " +
            "the 'teamcity.internal.gradle.runner.doNotPopulateGradleProperties' configuration parameter to 'true'.\n"
    logger.lifecycle(warningMessage)
  }

  private void addTeamCityPropertiesToExtraProperties(Project project) {
    if (doNotPopulateGradleProperties()) return

    if (!BuildFeatures.isConfigurationCacheRequested(project.gradle)) {
      // When the configuration cache is not used,
      // we can simply read the file and directly add the properties from it to the project's extra properties,
      // as we did in the older init script.
      setTeamCityPropertiesOnProject(project, getPropertiesFromFile(logger))
    } else {
      // When the configuration cache is used, we try add only the properties we consider non-volatile
      // to ensure backwards compatibility with the previous integration logic (see init_since_8.gradle).
      // We set up these properties as configuration inputs, so a change to any of these properties will invalidate the configuration cache.
      Map<Object, Object> nonVolatileProperties = project.providers.of(TeamCityPropertiesValueSource.class) {}.getOrNull()
      setTeamCityPropertiesOnProject(project, nonVolatileProperties)
    }
  }

  private static boolean doNotPopulateGradleProperties() {
    return Boolean.valueOf(System.getProperty(Constants.DO_NOT_POPULATE_GRADLE_PROPERTIES_SYSTEM_PROP))
  }

  private static Properties getPropertiesFromFile(Logger logger) {
    try {
      return PropertiesFileReader.loadPropertiesFromFile()
    } catch (IOException e) {
      logger.log(LogLevel.ERROR, e.getMessage(), e)
      return new Properties()
    }
  }

  private static void setTeamCityPropertiesOnProject(Project project, Map<Object, Object> properties) {
    properties.each { key, value -> project.ext.set(key, value) }
    project.ext.teamcity = properties
  }
}

class PropertiesFileReader {
  // This method reads the file using RandomAccessFile, so that the file is not tracked as a configuration phase input.
  // Thus, changes to the file do not invalidate the configuration cache.
  // We need this because the properties file changes every build and we want to avoid unnecessary cache invalidations.
  static Properties loadPropertiesFromFile() throws IOException {
    String filePath = getPropertiesFilePath()
    if (filePath == null) return new Properties()

    Properties properties = new Properties()
    new RandomAccessFile(filePath, "r").withCloseable { RandomAccessFile randomAccessFile ->
      byte[] data = new byte[(int) randomAccessFile.length()]
      randomAccessFile.readFully(data)
      properties.load(new ByteArrayInputStream(data))
    }

    return properties
  }

  private static String getPropertiesFilePath() {
    return System.getProperty(Constants.BUILD_PROPERTIES_FILE_SYSTEM_PROP) ?:
            System.getenv(Constants.BUILD_PROPERTIES_FILE_ENV_VAR)
  }
}

// This class filters the properties we consider "non-volatile", meaning their values do not change from build to build.
// The heuristics used are quite unreliable. They are kept only for backwards compatibility with the previous integration logic (see init_since_8.gradle).
class NonVolatileBuildPropertiesFilter {
  static Map<Object, Object> filterNonVolatileProperties(Properties properties) {
    return properties.findAll { Object key, Object value ->
      !isAVolatileProperty(key)
    } as Map<Object, Object>
  }

  private static boolean isAVolatileProperty(Object key) {
    String propertyKey = key.toString()

    // Drop the dependency name prefix
    if (propertyKey.startsWith("dep.")) {
      propertyKey = propertyKey.substring(propertyKey.indexOf('.', 4) + 1)
    }

    if (propertyKey.startsWith("build.")) return true
    if (propertyKey.startsWith("teamcity.build.id")) return true
    if (nonVolatileTeamCityPrefixes.any { String prefix -> propertyKey.startsWith(prefix) }) return false

    return propertyKey.startsWith("teamcity.")
  }

  private static final List<String> nonVolatileTeamCityPrefixes = [
          "teamcity.build.",
          "teamcity.buildConfName",
          "teamcity.buildType.",
          "teamcity.configuration.",
          "teamcity.runner.",
          "teamcity.projectName",
          "teamcity.tests."
  ]
}

// ValueSource used to track non-volatile build properties as a configuration phase input.
abstract class TeamCityPropertiesValueSource implements ValueSource<Map<Object, Object>, ValueSourceParameters.None>, Describable {
  @Override
  Map<Object, Object> obtain() {
    try {
      Properties properties = PropertiesFileReader.loadPropertiesFromFile()
      return NonVolatileBuildPropertiesFilter.filterNonVolatileProperties(properties)
    } catch (IOException ignored) {
      return null
    }
  }

  @Override
  String getDisplayName() {
    return "TeamCity build properties collection"
  }
}

