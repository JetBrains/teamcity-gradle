class ServiceMessage {
  static final List<String> IGNORED_TAGD = ['tc:tags', 'flowId', 'parent']
  static final String ESCAPE_CHARACTER = '|'
  static final String START_MESSAGE = '##teamcity['
  static final String END_MESSAGE = ']'
  String name
  Map<String, String> attributes

  ServiceMessage withFlowId(String flowId) {
    attributes['flowId'] = flowId
    return this
  }

  String asString() {
    StringBuilder msg = new StringBuilder(START_MESSAGE).append(name)
    if (attributes == null || attributes.isEmpty()) {
    } else if (attributes[''] != null) {
      msg = appendAttribute(msg, null, attributes[''])
    } else {
      def tags = attributes['tc:tags']
      if (tags != null) msg = appendAttribute(msg, 'tc:tags', tags)
      def flowId = attributes['flowId']
      def parent = attributes['parent']
      for (def attr: attributes.entrySet()) {
        if (!IGNORED_TAGD.contains(attr.key)) msg = appendAttribute(msg, attr.key, attr.value)
      }
      if (flowId != null) msg = appendAttribute(msg, 'flowId', flowId)
      if (parent != null) msg = appendAttribute(msg, 'parent', parent)
    }
    return msg.append(END_MESSAGE).toString()
  }

  private StringBuilder appendAttribute(StringBuilder msg, String key, Object value) {
    String strValue = null
    if (value instanceof String) {
      strValue = value
    } else {
      strValue = value as String
    }
    if (key == null) {
      msg.append(' \'')
    } else {
      msg.append(' ').append(key).append('=\'')
    }
    if (strValue != null) {
      for (int i = 0; i < strValue.length(); i++) {
        char ch = strValue.charAt(i)
        switch (ch) {
          case '\n': msg.append(ESCAPE_CHARACTER).append('n'); break
          case '\r': msg.append(ESCAPE_CHARACTER).append('r'); break
          case '|': msg.append(ESCAPE_CHARACTER).append('|'); break
          case '\'': msg.append(ESCAPE_CHARACTER).append('\''); break
          case '[': msg.append(ESCAPE_CHARACTER).append('['); break
          case ']': msg.append(ESCAPE_CHARACTER).append(']'); break
          default: ch < 128 ? msg.append(ch) : msg.append(ESCAPE_CHARACTER).append(String.format("0x%04x", (int)ch)); break
        }
      }
    }
    return msg.append('\'')
  }
}

class BuildFeatures {
  static boolean isConfigurationCacheRequested(Gradle gradle) {
    try {
      return getBuildFeatures(gradle).configurationCache.requested.getOrElse(false)
    } catch (ClassNotFoundException ignored) {
      def startParameter = gradle.startParameter
      return startParameter.class.getMethod("isConfigurationCacheRequested").invoke(startParameter)
    }
  }

  static boolean areIsolatedProjectsEnabled(Gradle gradle) {
    try {
      return getBuildFeatures(gradle).isolatedProjects.active.getOrElse(false)
    } catch (ClassNotFoundException ignored) {
      def value = System.getProperty(Constants.GRADLE_UNSAFE_ISOLATED_PROJECTS_SYSTEM_PROP)
      return value != null && value.toBoolean()
    }
  }

  private static Object getBuildFeatures(Gradle gradle) {
    Class buildFeaturesClass = Class.forName("org.gradle.api.configuration.BuildFeatures", false, gradle.class.classLoader)
    def services = gradle.class.getMethod("getServices").invoke(gradle)
    return services.get(buildFeaturesClass)
  }
}

class Util {
  static boolean isInstance(Class clazz, String name) {
    if (clazz == null) return false
    if (clazz.name == name) return true
    if (clazz.name == "java.lang.Object") return false
    for (Class clazz0 : clazz.interfaces) {
      if (isInstance(clazz0, name)) return true
    }
    if (isInstance(clazz.superclass, name)) return true
  }

  static String getFlowIdForTask(String taskPath) {
    String flowIfPrefix = "%%teamcity%%-"
    return flowIfPrefix + String.valueOf(taskPath.hashCode())
  }
}

class AfterEvaluateListener implements ProjectEvaluationListener {
  private final Closure action

  AfterEvaluateListener(Closure action) {
    this.action = action
  }

  @Override
  void beforeEvaluate(Project project) {
  }

  @Override
  void afterEvaluate(Project project, ProjectState projectState) {
    action(project)
  }
}

// region Setup of build log presentation for compile tasks stderr

/**
 * Collects stderr output for compile tasks and reports them as compilation error messages, creating a "compilation error" build problem.
 */
abstract class CompileTaskErrorOutputService implements BuildService<BuildServiceParameters.None>, OperationCompletionListener {
  private static final Logger logger = Logging.getLogger(CompileTaskErrorOutputService)

  private final ConcurrentMap<String, ErrorOutputListener> errorOutputListeners = new ConcurrentHashMap<>()

  void addCompileTaskErrorOutputListener(Task task) {
    boolean isCompileTask = task instanceof AbstractCompile || Util.isInstance(task.class, "org.jetbrains.kotlin.gradle.tasks.KotlinCompileTool")
    if (!isCompileTask) return

    ErrorOutputListener errorOutputListener = new ErrorOutputListener()
    errorOutputListeners.put(task.path, errorOutputListener)
    task.logging.addStandardErrorListener(errorOutputListener)
  }

  @Override
  void onFinish(FinishEvent finishEvent) {
    if (!(finishEvent instanceof TaskFinishEvent)) return
    if (!(finishEvent.result instanceof TaskFailureResult)) return

    def taskPath = finishEvent.descriptor.taskPath

    def errorOutputListener = errorOutputListeners.remove(taskPath)
    if (errorOutputListener == null) return

    def flowId = Util.getFlowIdForTask(taskPath)

    logger.lifecycle(new ServiceMessage(name: "compilationStarted", attributes: [compiler: taskPath]).withFlowId(flowId).asString())
    errorOutputListener.getMessages().each { msg ->
      logger.lifecycle(new ServiceMessage(name: "message", attributes: [text: msg, status: "ERROR"]).withFlowId(flowId).asString())
    }
    logger.lifecycle(new ServiceMessage(name: "compilationFinished", attributes: [compiler: taskPath]).withFlowId(flowId).asString())
  }

  private static class ErrorOutputListener implements StandardOutputListener {
    private final StringBuffer stringBuffer = new StringBuffer()

    @Override
    void onOutput(CharSequence chars) {
      stringBuffer.append(chars)
    }

    Collection<String> getMessages() {
      def messages = []
      def lines = stringBuffer.toString().split('\\r?\\n')
      for (line in lines) {
        def trimmedLine = line.trim()
        if (trimmedLine.length() > 0) {
          messages.add(line)
        }
      }
      return messages
    }
  }
}

/**
 * Registers {@link CompileTaskErrorOutputService} and sets it up to handle task starts and completions.
 */
abstract class CompileTaskErrorOutputPlugin implements Plugin<Gradle> {
  @Inject
  abstract BuildEventsListenerRegistry getBuildEventsListenerRegistry()

  @Override
  void apply(Gradle gradle) {
    def compileTaskErrorOutputServiceProvider =
            gradle.sharedServices.registerIfAbsent("compileTaskErrorOutputService", CompileTaskErrorOutputService) {}

    gradle.addListener(new AfterEvaluateListener({ Project project ->
      project.tasks.configureEach { Task task ->
        task.doFirst {
          compileTaskErrorOutputServiceProvider.get().addCompileTaskErrorOutputListener(it)
        }
      }
    }))
    buildEventsListenerRegistry.onTaskCompletion(compileTaskErrorOutputServiceProvider)
  }
}

